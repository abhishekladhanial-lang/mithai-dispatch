<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#14532d">
    <title>Mithai Dispatch</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icon.svg">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main id="app"></main>
    <template id="line-item-template">
      <div class="line-item">
        <select class="department-select" aria-label="Department"></select>
        <select class="product-select" aria-label="Product"></select>
        <input class="qty-input" type="number" inputmode="decimal" min="0" step="0.01" placeholder="Qty kg" aria-label="Quantity">
        <button class="icon-btn remove-line" type="button" title="Remove item" aria-label="Remove item">×</button>
      </div>
    </template>
    <script src="/app.js" defer></script>
  </body>
</html>
